  :root {
    --purple: #6F499D;
    --purple-dark: #4a2d70;
    --purple-deep: #2d1a45;
    --purple-light: #B4A8CE;
    --purple-tint: #D4CFE5;
    --orange: #F58220;
    --orange-glow: #F5A623;
    --orange-tint: #F8E2CB;
    --dark: #2D2D2D;
    --green: #34c759;
    --red: #e74c3c;
    --card-bg: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, var(--purple) 0%, var(--purple-dark) 50%, var(--purple-deep) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  /* Floating background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    opacity: 0.08;
    background: var(--orange);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    top: -120px; right: -140px;
    animation: blobFloat 18s ease-in-out infinite;
  }
  body::after {
    width: 400px; height: 400px;
    bottom: -80px; left: -120px;
    animation: blobFloat 22s ease-in-out infinite reverse;
  }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 18px;
  }
  .header-brand {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--purple-light);
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 28px;
    color: #fff;
    line-height: 1.15;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }
  .header h1 span {
    color: var(--orange);
  }

  /* Progress */
  .progress-bar {
    margin-bottom: 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--purple-light);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .progress-info .score {
    color: var(--orange);
  }
  .progress-track {
    height: 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--orange), var(--orange-glow));
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border-radius: 20px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    overflow: hidden;
    transition: opacity 0.3s, transform 0.3s;
  }
  .card.fade-out {
    opacity: 0;
    transform: translateY(16px) scale(0.98);
  }

    animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
