<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktywna strona</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Moja interaktywna strona</h1>
    <button onclick="changeBackground()">Zmień tło</button>
    <div class="container">
        <div class="card">
            <h2>Licznik</h2>
            <p id="counter-display">0</p>
            <button onclick="addPoint()">+1</button>
            <button onclick="resetCounter()">Reset</button>
        </div>
        <div class="card">
            <h2>Losowanie</h2>
            <p id="random-display">Kliknij i sprawdź!</p>
            <button onclick="drawItem()">Losuj!</button>
            <button onclick="toggleAuto()">Auto</button>
        </div>
        <div class="card">
            <h2>Widget</h2>
            <iframe src="https://www.google.com/maps?q=Warszawa&output=embed"
                width="250" height="200"
                style="border:0; border-radius:8px;" loading="lazy">
            </iframe>
        </div>
        <div class="card">
            <h2>Wideo</h2>
            <iframe width="250" height="150"
                src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                style="border:0; border-radius:8px;">
            </iframe>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
