<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zadanie dodatkowe - Straż pożarna</title>
<style>
	body {
		background-color: #cfe8ff;
		font-family: sans-serif;
		margin: 0;
		padding: 24px;
	}

	h1 {
		color: #b00000;
		font-size: 22px;
	}

	#siren {
		position: relative;
		left: 200px;
		width: 100px;
		height: 100px;
		background-color: darkred;
		border-radius: 50px 50px 5px 5px;
	}

	#siren:hover {
		animation: siren 0.8s infinite;
	}

	@keyframes siren {
		0% { background-color: red; }
		50% { background-color: orange; }
		100% { background-color: red; }
	}

	#ladder {
		position: relative;
		left: 235px;
		width: 240px;
		height: 14px;
		background: repeating-linear-gradient(90deg, #888 0 10px, #d0d0d0 10px 20px);
		border: 1px solid #555;
		border-radius: 4px;
		transform: rotate(-8deg);
	}

	#body {
		width: 500px;
		height: 240px;
		display: flex;
		align-items: center;
		justify-content: center;
		color: white;
		font-weight: bold;
		font-family: monospace;
		font-size: 40px;
		text-align: center;
		background: linear-gradient(0deg, #8a0000 0%, #ff3b3b 50%, #8a0000 100%);
		border: 2px solid #5a0000;
		border-radius: 180px 10px 10px 20px;
	}

	.wheel {
		width: 90px;
		height: 90px;
		background: #e8e8e8;
		border: 10px solid black;
		border-radius: 100px;
		text-align: center;
		line-height: 90px;
		color: grey;
		animation: spin 1s linear infinite;
	}

	@keyframes spin {
		from { transform: rotate(0deg); }
		to { transform: rotate(360deg); }
	}

	#wheel-front {
		position: relative;
		bottom: 50px;
		left: 70px;
	}

	#wheel-back {
		position: relative;
		bottom: 150px;
		left: 350px;
	}

	#sign {
		position: absolute;
		right: 22%;
		top: 240px;
		padding: 20px;
		background: red;
		color: white;
		text-align: center;
		font-weight: bold;
		border: 3px solid yellow;
		border-radius: 10px;
		transition: transform 1s;
	}

	#sign:hover {
		transform: scale(1.5);
	}
</style>
</head>
<body>
	<h1>Zadanie dodatkowe: Straż pożarna</h1>
	<div id="siren"></div>
	<div id="ladder"></div>
	<div id="body">STRAŻ POŻARNA</div>
	<div id="wheel-front" class="wheel">X</div>
	<div id="wheel-back" class="wheel">X</div>
	<div id="sign">ALARM POŻAROWY<br>998</div>
</body>
</html>
