<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8">
	<title>Ściśle tajne</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>Strefa tajna</h1>
	<p>Podaj hasło, aby uzyskać dostęp.</p>
	<input type="password" id="password" placeholder="Hasło">
	<label><input type="checkbox" id="show"> Pokaż hasło</label>
	<button id="unlock">Odblokuj</button>
	<p id="message"></p>
	<section id="secret" class="hidden">
		<h2>Akta agenta</h2>
		<p>Misja Kryptonim Sokół: o północy odbierz paczkę przy fontannie w parku. Hasło rozpoznawcze brzmi "księżyc w pełni". Nie ufaj nikomu w czerwonym szaliku.</p>
	</section>
	<script src="script.js"></script>
</body>
</html>
