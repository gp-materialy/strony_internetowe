<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moja galeria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Moja galeria zdjęć</h1>
  </header>
  <nav>
    <button id="menu-toggle">☰ Menu</button>
    <ul id="nav-links">
      <li><a href="#">Galeria</a></li>
      <li><a href="#">O mnie</a></li>
      <li><a href="#">Kontakt</a></li>
    </ul>
  </nav>
  <section class="gallery">
    <div class="photo-item">
      <img src="https://picsum.photos/300/200?random=1" alt="Zdjęcie 1">
      <div class="photo-caption">Górski poranek</div>
    </div>
    <div class="photo-item">
      <img src="https://picsum.photos/300/200?random=2" alt="Zdjęcie 2">
      <div class="photo-caption">Miasto nocą</div>
    </div>
    <div class="photo-item">
      <img src="https://picsum.photos/300/200?random=3" alt="Zdjęcie 3">
      <div class="photo-caption">Lis w lesie</div>
    </div>
    <div class="photo-item">
      <img src="https://picsum.photos/300/200?random=4" alt="Zdjęcie 4">
      <div class="photo-caption">Zachód słońca</div>
    </div>
    <div class="photo-item">
      <img src="https://picsum.photos/300/200?random=5" alt="Zdjęcie 5">
      <div class="photo-caption">Ulica deszczem</div>
    </div>
    <div class="photo-item">
      <img src="https://picsum.photos/300/200?random=6" alt="Zdjęcie 6">
      <div class="photo-caption">Morze o świcie</div>
    </div>
  </section>
  <footer>
    <p>© Moja galeria 2025</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
